# Re-scores every registered strategy on fresh SPY data and commits the updated
# board. Runs on a schedule so out-of-sample records grow on their own, and on
# any change under registry/ so a newly merged submission is scored immediately.
name: score-registry

on:
  schedule:
    - cron: "23 14 * * *" # daily, offset off the hour
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - registry/**

permissions:
  contents: write

jobs:
  score:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Score the registry on fresh data
        run: python registry/score.py

      - name: Commit the updated board if it changed
        run: |
          git config user.name "hilothefunnydog123-coder"
          git config user.email "229661712+hilothefunnydog123-coder@users.noreply.github.com"
          git add registry/scoreboard.json registry/README.md
          git diff --cached --quiet || git commit -m "registry: re-score on fresh data"
          git push
